<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4E6B47" />
  <meta name="description" content="PWA para decidir qué cocinar según ingredientes, antojo, tiempo y meal prep con enfoque NiME/milpa." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
  <title>Milpa NiME</title>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Milpa NiME</h1>
      <p class="subtitle">Qué cocinar hoy con lo que hay</p>
    </div>
    <button id="installBtn" class="secondary hidden" type="button">Instalar</button>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>1. Inventario</h2>
      <p class="hint">Marca lo que tienes. Usa “urgente” si conviene gastarlo pronto.</p>
      <div id="inventoryFilters" class="chips"></div>
      <div id="inventoryList" class="inventory-grid"></div>
    </section>

    <section class="panel">
      <h2>2. Antojo y contexto</h2>

      <label class="field">
        <span>Antojo</span>
        <div id="cravingChips" class="chips"></div>
      </label>

      <label class="field">
        <span>Tiempo disponible</span>
        <select id="timeSelect">
          <option value="15">15 min o menos</option>
          <option value="20">20 min</option>
          <option value="30" selected>30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min o más</option>
        </select>
      </label>

      <label class="field">
        <span>Modo</span>
        <select id="modeSelect">
          <option value="today" selected>Hoy</option>
          <option value="rescue">Rescate</option>
          <option value="mealprep">Meal prep</option>
          <option value="metabolic">Metabólico suave</option>
        </select>
      </label>

      <label class="checkbox">
        <input id="lowEnergy" type="checkbox" />
        <span>Poca energía / baja fricción</span>
      </label>

      <label class="checkbox">
        <input id="seasonBoost" type="checkbox" checked />
        <span>Favorecer temporada en México</span>
      </label>

      <div class="actions">
        <button id="suggestBtn" type="button">Sugerir</button>
        <button id="resetBtn" class="secondary" type="button">Limpiar</button>
      </div>
    </section>

    <section class="panel">
      <h2>3. Resultados</h2>
      <div id="summaryBox" class="summary-box"></div>
      <div id="results" class="results"></div>
    </section>

    <section class="panel">
      <h2>4. Meal prep</h2>
      <div id="mealPrepBox"></div>
    </section>
  </main>

  <template id="recipeCardTemplate">
    <article class="recipe-card">
      <div class="recipe-top">
        <div>
          <h3 class="recipe-title"></h3>
          <p class="recipe-meta"></p>
        </div>
        <div class="score-badge"></div>
      </div>

      <p class="recipe-description"></p>

      <div class="recipe-section">
        <strong>Por qué salió:</strong>
        <ul class="why-list"></ul>
      </div>

      <div class="recipe-section">
        <strong>Ingredientes clave:</strong>
        <p class="ingredients-text"></p>
      </div>

      <div class="recipe-section">
        <strong>Perfil:</strong>
        <p class="profile-text"></p>
      </div>

      <div class="recipe-section">
        <strong>Meal prep:</strong>
        <p class="mealprep-text"></p>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
